<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Tools — Dev Tools</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --surface2: #f0f0ee;
    --surface3: #e8e8e5;
    --border: rgba(0,0,0,0.07);
    --border2: rgba(0,0,0,0.12);
    --text: #1a1a1a;
    --text2: #555550;
    --text3: #999990;
    --accent: #2563eb;
    --accent-dim: rgba(37,99,235,0.08);
    --green: #16a34a;
    --green-dim: rgba(22,163,74,0.08);
    --amber: #b45309;
    --amber-dim: rgba(180,83,9,0.08);
    --red: #dc2626;
    --red-dim: rgba(220,38,38,0.08);
    --radius: 8px;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  /* Nav */
  .topnav { display: flex; align-items: center; gap: 24px; padding: 0 24px; height: 48px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .nav-brand { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--accent); letter-spacing: 0.08em; display: flex; align-items: center; gap: 8px; margin-right: 8px; }
  .nav-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .nav-links { display: flex; gap: 2px; }
  .nav-link { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--text3); text-decoration: none; padding: 6px 12px; border-radius: var(--radius); transition: color 0.15s, background 0.15s; letter-spacing: 0.03em; }
  .nav-link:hover { color: var(--text); background: var(--surface2); }
  .nav-link.active { color: var(--text); background: var(--surface2); }

  /* Tool tabs */
  .tool-tabs-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; }
  .tool-tab { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--text3); background: none; border: none; border-bottom: 2px solid transparent; padding: 12px 18px; cursor: pointer; letter-spacing: 0.04em; margin-bottom: -1px; transition: color 0.15s; }
  .tool-tab:hover { color: var(--text2); }
  .tool-tab.active { color: var(--text); border-bottom-color: var(--accent); }

  /* Layout */
  .page-body { flex: 1; padding: 24px; display: flex; flex-direction: column; gap: 16px; overflow: hidden; height: calc(100vh - 97px); }
  .tool-panel { display: none; flex-direction: column; gap: 16px; flex: 1; overflow: hidden; }
  .tool-panel.active { display: flex; }

  /* Formatter layout */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; flex: 1; overflow: hidden; }
  .col { display: flex; flex-direction: column; gap: 8px; overflow: hidden; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .card.stretch { flex: 1; overflow: hidden; }
  .card-title { font-family: var(--mono); font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }

  /* Form elements */
  textarea { font-family: var(--mono); font-size: 12px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text); outline: none; transition: border-color 0.15s; width: 100%; padding: 12px; resize: none; line-height: 1.7; flex: 1; }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text3); }

  /* Buttons */
  .btn-primary { font-family: var(--mono); font-size: 12px; font-weight: 600; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); padding: 0 16px; height: 32px; cursor: pointer; letter-spacing: 0.04em; transition: opacity 0.15s; white-space: nowrap; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-secondary { font-family: var(--mono); font-size: 11px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text2); padding: 0 12px; height: 30px; cursor: pointer; transition: color 0.15s; white-space: nowrap; }
  .btn-secondary:hover { color: var(--text); }
  .btn-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }

  /* Output */
  .output-area { position: relative; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); flex: 1; overflow-y: auto; }
  .output-content { font-family: var(--mono); font-size: 12px; line-height: 1.75; padding: 12px 44px 12px 14px; white-space: pre-wrap; word-break: break-all; }
  .output-copy { position: absolute; top: 8px; right: 8px; font-family: var(--mono); font-size: 10px; font-weight: 600; background: var(--surface3); border: 1px solid var(--border2); border-radius: 6px; color: var(--text3); padding: 3px 8px; cursor: pointer; transition: color 0.15s; }
  .output-copy:hover { color: var(--text); }

  /* Diff specific */
  .diff-added { background: rgba(22,163,74,0.1); color: #15803d; display: block; }
  .diff-removed { background: rgba(220,38,38,0.08); color: #dc2626; display: block; text-decoration: line-through; }
  .diff-unchanged { display: block; color: var(--text2); }
  .diff-key { color: #1d4ed8; }

  /* Alert */
  .alert { font-size: 12px; font-family: var(--mono); padding: 8px 12px; border-radius: var(--radius); display: none; }
  .alert.show { display: block; }
  .alert-err { background: var(--red-dim); color: var(--red); border: 1px solid rgba(220,38,38,0.15); }
  .alert-ok  { background: var(--green-dim); color: var(--green); border: 1px solid rgba(22,163,74,0.15); }

  /* JSON colours */
  .jk { color: #1d4ed8; }
  .js { color: #15803d; }
  .jn { color: #b45309; }
  .jb { color: #7c3aed; }
  .jz { color: #999990; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-brand"><span class="nav-dot"></span>DEV TOOLS</div>
  <div class="nav-links">
    <a class="nav-link" href="crud-client.html">HTTP Client</a>
    <a class="nav-link" href="token-tools.html">Token Tools</a>
    <a class="nav-link active" href="json-tools.html">JSON</a>
    <a class="nav-link" href="regex-tester.html">Regex</a>
    <a class="nav-link" href="encoders.html">Encoders</a>
    <a class="nav-link" href="text-diff.html">Text Diff</a>
    <a class="nav-link" href="converters.html">Converters</a>
  </div>
</nav>

<div class="tool-tabs-bar">
  <button class="tool-tab active" onclick="switchTool('format', this)">Formatter</button>
  <button class="tool-tab" onclick="switchTool('diff', this)">Diff</button>
</div>

<div class="page-body">

  <!-- FORMATTER -->
  <div class="tool-panel active" id="panel-format">
    <div class="two-col">
      <div class="col">
        <div class="card stretch">
          <div class="card-title">
            Input
            <div class="btn-row">
              <button class="btn-secondary" onclick="formatJson()">Format</button>
              <button class="btn-secondary" onclick="minifyJson()">Minify</button>
              <button class="btn-secondary" onclick="clearFormat()">Clear</button>
            </div>
          </div>
          <textarea id="fmt-input" placeholder='{"paste": "your JSON here"}' spellcheck="false" oninput="liveFormat()"></textarea>
          <div class="alert alert-err" id="fmt-err"></div>
        </div>
      </div>
      <div class="col">
        <div class="card stretch">
          <div class="card-title">
            Output
            <button class="output-copy" style="position:relative;top:auto;right:auto;" onclick="copyText('fmt-output')">Copy</button>
          </div>
          <div class="output-area">
            <div class="output-content" id="fmt-output"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- DIFF -->
  <div class="tool-panel" id="panel-diff">
    <div class="two-col" style="flex:0 0 auto; max-height: 38%;">
      <div class="card" style="overflow:hidden; display:flex; flex-direction:column;">
        <div class="card-title">JSON A</div>
        <textarea id="diff-a" placeholder='{"version": 1, "name": "Alice"}' spellcheck="false" style="flex:1;min-height:120px;"></textarea>
      </div>
      <div class="card" style="overflow:hidden; display:flex; flex-direction:column;">
        <div class="card-title">JSON B</div>
        <textarea id="diff-b" placeholder='{"version": 2, "name": "Alice", "role": "admin"}' spellcheck="false" style="flex:1;min-height:120px;"></textarea>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="runDiff()">Compare</button>
      <button class="btn-secondary" onclick="clearDiff()">Clear</button>
      <div class="alert alert-err" id="diff-err"></div>
    </div>
    <div class="card stretch">
      <div class="card-title">
        Result
        <button class="output-copy" style="position:relative;top:auto;right:auto;" onclick="copyText('diff-output')">Copy</button>
      </div>
      <div class="output-area">
        <div class="output-content" id="diff-output"></div>
      </div>
    </div>
  </div>

</div>

<script>
  function $(id) { return document.getElementById(id); }

  function showAlert(id, msg) { const e = $(id); e.textContent = msg; e.classList.add('show'); e.style.display = ''; }
  function hideAlert(id) { const e = $(id); e.classList.remove('show'); e.style.display = 'none'; }

  function copyText(id) {
    const el = $(id);
    const text = el.innerText || el.value || '';
    navigator.clipboard.writeText(text.trim()).then(() => showToast('Copied!'));
  }

  function showToast(msg) {
    let t = $('toast');
    if (!t) { t = document.createElement('div'); t.id = 'toast'; t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-family:var(--mono);font-size:12px;padding:8px 18px;border-radius:8px;z-index:999;pointer-events:none;transition:opacity 0.3s;'; document.body.appendChild(t); }
    t.textContent = msg; t.style.opacity = '1'; clearTimeout(t._to); t._to = setTimeout(() => t.style.opacity = '0', 1800);
  }

  function switchTool(name, btn) {
    document.querySelectorAll('.tool-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tool-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    $('panel-' + name).classList.add('active');
  }

  /* ── Syntax highlight ── */
  function highlight(obj) {
    const s = JSON.stringify(obj, null, 2);
    return s.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, m => {
      if (/^"/.test(m)) return /:$/.test(m) ? `<span class="jk">${m}</span>` : `<span class="js">${m}</span>`;
      if (/true|false/.test(m)) return `<span class="jb">${m}</span>`;
      if (/null/.test(m)) return `<span class="jz">${m}</span>`;
      return `<span class="jn">${m}</span>`;
    });
  }

  /* ── Formatter ── */
  function liveFormat() {
    hideAlert('fmt-err');
    const raw = $('fmt-input').value.trim();
    if (!raw) { $('fmt-output').innerHTML = ''; return; }
    try {
      $('fmt-output').innerHTML = highlight(JSON.parse(raw));
    } catch(e) {
      $('fmt-output').innerHTML = '';
      showAlert('fmt-err', e.message);
    }
  }

  function formatJson() {
    const raw = $('fmt-input').value.trim();
    try { $('fmt-input').value = JSON.stringify(JSON.parse(raw), null, 2); liveFormat(); }
    catch(e) { showAlert('fmt-err', e.message); }
  }

  function minifyJson() {
    const raw = $('fmt-input').value.trim();
    try { $('fmt-input').value = JSON.stringify(JSON.parse(raw)); liveFormat(); }
    catch(e) { showAlert('fmt-err', e.message); }
  }

  function clearFormat() {
    $('fmt-input').value = '';
    $('fmt-output').innerHTML = '';
    hideAlert('fmt-err');
  }

  /* ── Diff ── */
  function runDiff() {
    hideAlert('diff-err');
    let a, b;
    try { a = JSON.parse($('diff-a').value); } catch(e) { showAlert('diff-err', 'JSON A: ' + e.message); return; }
    try { b = JSON.parse($('diff-b').value); } catch(e) { showAlert('diff-err', 'JSON B: ' + e.message); return; }
    $('diff-output').innerHTML = renderDiff(a, b, 0);
  }

  function clearDiff() {
    $('diff-a').value = ''; $('diff-b').value = '';
    $('diff-output').innerHTML = '';
    hideAlert('diff-err');
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  /* ── localStorage ── */
  (function() {
    function save() {
      const activeTab = document.querySelector('.tool-tab.active');
      localStorage.setItem('json_tab', activeTab ? activeTab.textContent.trim() : '');
      localStorage.setItem('json_fmt', $('fmt-input').value);
      localStorage.setItem('json_da',  $('diff-a').value);
      localStorage.setItem('json_db',  $('diff-b').value);
    }
    document.addEventListener('input', save);
    const _st = window.switchTool;
    window.switchTool = function(name, btn) { _st(name, btn); save(); };
    function restore() {
      const tab = localStorage.getItem('json_tab') || '';
      const fmt = localStorage.getItem('json_fmt') || '';
      const da  = localStorage.getItem('json_da')  || '';
      const db  = localStorage.getItem('json_db')  || '';
      if (fmt) { $('fmt-input').value = fmt; liveFormat(); }
      if (da)  $('diff-a').value = da;
      if (db)  $('diff-b').value = db;
      if (tab === 'Diff') {
        const btn = document.querySelectorAll('.tool-tab')[1];
        if (btn) window.switchTool('diff', btn);
      }
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', restore);
    else restore();
  })();

  function renderDiff(a, b, depth) {
    const indent = '  '.repeat(depth);
    const childIndent = '  '.repeat(depth + 1);
    let html = '';

    if (typeof a !== 'object' || typeof b !== 'object' || a === null || b === null || Array.isArray(a) !== Array.isArray(b)) {
      if (JSON.stringify(a) !== JSON.stringify(b)) {
        html += `<span class="diff-removed">${indent}${esc(JSON.stringify(a))}</span>`;
        html += `<span class="diff-added">${indent}${esc(JSON.stringify(b))}</span>`;
      } else {
        html += `<span class="diff-unchanged">${indent}${esc(JSON.stringify(a))}</span>`;
      }
      return html;
    }

    const isArr = Array.isArray(a);
    const open = isArr ? '[' : '{';
    const close = isArr ? ']' : '}';
    html += `<span class="diff-unchanged">${indent}${open}</span>\n`;

    const keys = new Set([...Object.keys(a), ...Object.keys(b)]);
    keys.forEach(k => {
      const keyPrefix = isArr ? '' : `<span class="diff-key">"${esc(k)}"</span>: `;
      if (!(k in a)) {
        html += `<span class="diff-added">${childIndent}${keyPrefix}${esc(JSON.stringify(b[k]))}</span>\n`;
      } else if (!(k in b)) {
        html += `<span class="diff-removed">${childIndent}${keyPrefix}${esc(JSON.stringify(a[k]))}</span>\n`;
      } else if (typeof a[k] === 'object' && typeof b[k] === 'object' && a[k] !== null && b[k] !== null) {
        html += `<span class="diff-unchanged">${childIndent}${keyPrefix}</span>\n`;
        html += renderDiff(a[k], b[k], depth + 2);
      } else if (JSON.stringify(a[k]) !== JSON.stringify(b[k])) {
        html += `<span class="diff-removed">${childIndent}${keyPrefix}${esc(JSON.stringify(a[k]))}</span>\n`;
        html += `<span class="diff-added">${childIndent}${keyPrefix}${esc(JSON.stringify(b[k]))}</span>\n`;
      } else {
        html += `<span class="diff-unchanged">${childIndent}${keyPrefix}${esc(JSON.stringify(a[k]))}</span>\n`;
      }
    });

    html += `<span class="diff-unchanged">${indent}${close}</span>\n`;
    return html;
  }
</script>
</body>
</html>
